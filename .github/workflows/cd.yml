name: CD

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy production
    runs-on: ubuntu-latest
    environment: production
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.head_branch == 'main' &&
       vars.CD_ENABLED == 'true')

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: smart-exam-web/package-lock.json

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Build backend
        run: mvn -B -DskipTests package

      - name: Build web
        run: |
          npm --prefix smart-exam-web ci
          npm --prefix smart-exam-web run build

      - name: Install deploy dependencies
        run: python -m pip install -r scripts/deploy/requirements.txt

      - name: Deploy artifacts
        env:
          SMART_EXAM_SERVERS_JSON: ${{ secrets.SMART_EXAM_SERVERS_JSON }}
          BACKEND_POST_COMMAND: ${{ secrets.DEPLOY_BACKEND_POST_COMMAND }}
          FRONTEND_POST_COMMAND: ${{ secrets.DEPLOY_FRONTEND_POST_COMMAND }}
        run: |
          if [ -z "${SMART_EXAM_SERVERS_JSON}" ]; then
            echo "::error::Missing GitHub Secret SMART_EXAM_SERVERS_JSON"
            exit 1
          fi

          if [ -z "${BACKEND_POST_COMMAND}" ]; then
            echo "::warning::DEPLOY_BACKEND_POST_COMMAND is empty; backend artifacts will be uploaded without a restart command."
          fi

          python scripts/deploy/deploy-smart-exam.py both \
            --backend-post-command "${BACKEND_POST_COMMAND}" \
            --frontend-post-command "${FRONTEND_POST_COMMAND}"

      - name: Smoke check
        env:
          SMOKE_GATEWAY_URL: ${{ secrets.SMOKE_GATEWAY_URL }}
          SMOKE_USERNAME: ${{ secrets.SMOKE_USERNAME }}
          SMOKE_PASSWORD: ${{ secrets.SMOKE_PASSWORD }}
        run: |
          SMOKE_GATEWAY_URL="${SMOKE_GATEWAY_URL:-http://36.138.84.84:9000}"

          if [ -z "${SMOKE_USERNAME}" ] || [ -z "${SMOKE_PASSWORD}" ]; then
            echo "::notice::Smoke check skipped because SMOKE_USERNAME or SMOKE_PASSWORD is not configured."
            exit 0
          fi

          python scripts/deploy/smoke-check.py \
            --gateway "${SMOKE_GATEWAY_URL}" \
            --username "${SMOKE_USERNAME}" \
            --password "${SMOKE_PASSWORD}"
