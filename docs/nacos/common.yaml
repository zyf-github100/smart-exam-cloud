spring:
  datasource:
    username: ${MYSQL_USERNAME:smart_exam_app}
    password: ${MYSQL_PASSWORD:}
  data:
    redis:
      host: ${REDIS_HOST:127.0.0.1}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
  rabbitmq:
    host: ${RABBITMQ_HOST:127.0.0.1}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:smart_exam_app}
    password: ${RABBITMQ_PASSWORD:}
    publisher-confirm-type: correlated
    publisher-returns: true
    template:
      mandatory: true
    listener:
      simple:
        acknowledge-mode: manual
        default-requeue-rejected: false
        prefetch: 20

smart-exam:
  mq:
    exam-submitted:
      max-retries: 3
      retry-ttl-ms: 10000
    score-published:
      max-retries: 3
      retry-ttl-ms: 10000

security:
  jwt:
    secret: ${JWT_SECRET}
    expiration-seconds: 7200

management:
  endpoints:
    web:
      exposure:
        include: health,info
