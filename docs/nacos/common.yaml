spring:
  datasource:
    username: root
    password: root
  data:
    redis:
      host: 192.168.242.10
      port: 6379
  rabbitmq:
    host: 192.168.242.10
    port: 5672
    username: guest
    password: guest
    publisher-confirm-type: correlated
    publisher-returns: true
    template:
      mandatory: true
    listener:
      simple:
        acknowledge-mode: manual
        default-requeue-rejected: false
        prefetch: 20

smart-exam:
  mq:
    exam-submitted:
      max-retries: 3
      retry-ttl-ms: 10000
    score-published:
      max-retries: 3
      retry-ttl-ms: 10000

security:
  jwt:
    secret: ${JWT_SECRET}
    expiration-seconds: 7200

management:
  endpoints:
    web:
      exposure:
        include: health,info
