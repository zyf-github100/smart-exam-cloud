services:
  mysql:
    command:
      - --default-authentication-plugin=mysql_native_password
    container_name: smart-exam-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?Set MYSQL_ROOT_PASSWORD in .env}
      TZ: Asia/Shanghai
    image: mysql:8.0
    networks:
      - default
    ports:
      - "${MIDDLEWARE_BIND_HOST:-127.0.0.1}:${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  redis:
    command:
      - redis-server
      - --appendonly
      - "yes"
      - --requirepass
      - ${REDIS_PASSWORD:?Set REDIS_PASSWORD in .env}
    container_name: smart-exam-redis
    image: redis:7
    networks:
      - default
    ports:
      - "${MIDDLEWARE_BIND_HOST:-127.0.0.1}:${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data

  rabbitmq:
    container_name: smart-exam-rabbitmq
    image: rabbitmq:3-management
    networks:
      - default
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:?Set RABBITMQ_DEFAULT_USER in .env}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS:?Set RABBITMQ_DEFAULT_PASS in .env}
    ports:
      - "${MIDDLEWARE_BIND_HOST:-127.0.0.1}:${RABBITMQ_AMQP_PORT:-5672}:5672"
      - "${MIDDLEWARE_BIND_HOST:-127.0.0.1}:${RABBITMQ_MANAGEMENT_PORT:-15672}:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq

  nacos:
    container_name: smart-exam-nacos
    image: nacos/nacos-server:v2.3.2
    networks:
      - default
    environment:
      MODE: standalone
      PREFER_HOST_MODE: hostname
      NACOS_AUTH_ENABLE: ${NACOS_AUTH_ENABLE:-true}
      NACOS_AUTH_TOKEN: ${NACOS_AUTH_TOKEN:?Set NACOS_AUTH_TOKEN in .env}
      NACOS_AUTH_IDENTITY_KEY: ${NACOS_AUTH_IDENTITY_KEY:?Set NACOS_AUTH_IDENTITY_KEY in .env}
      NACOS_AUTH_IDENTITY_VALUE: ${NACOS_AUTH_IDENTITY_VALUE:?Set NACOS_AUTH_IDENTITY_VALUE in .env}
      NACOS_AUTH_TOKEN_EXPIRE_SECONDS: ${NACOS_AUTH_TOKEN_EXPIRE_SECONDS:-18000}
    ports:
      - "${NACOS_HTTP_PORT:-8848}:8848"
      - "${NACOS_GRPC_PORT:-9848}:9848"
      - "${NACOS_RAFT_PORT:-9849}:9849"
    volumes:
      - nacos_data:/home/nacos/data
      - nacos_logs:/home/nacos/logs

networks:
  default:
    name: smart-exam-mw_default

volumes:
  mysql_data:
    name: smart-exam-mw_mysql_data
  nacos_data:
    name: smart-exam-mw_nacos_data
  nacos_logs:
    name: smart-exam-mw_nacos_logs
  rabbitmq_data:
    name: smart-exam-mw_rabbitmq_data
  redis_data:
    name: smart-exam-mw_redis_data
