server:
  port: 9400

spring:
  application:
    name: grading-service
  datasource:
    url: ${MYSQL_URL:jdbc:mysql://localhost:3306/grading_db?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true}
    username: ${MYSQL_USERNAME:root}
    password: ${MYSQL_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      database: ${REDIS_DB_GRADING:5}
      timeout: 2s
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    banner: false

snowflake:
  worker-id: 4
  datacenter-id: 1

management:
  endpoints:
    web:
      exposure:
        include: health,info
