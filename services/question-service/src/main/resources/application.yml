server:
  port: 9200

spring:
  application:
    name: question-service
  datasource:
    url: ${MYSQL_URL:jdbc:mysql://localhost:3306/question_db?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true}
    username: ${MYSQL_USERNAME:root}
    password: ${MYSQL_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      database: ${REDIS_DB_QUESTION:1}
      timeout: 2s

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    banner: false

snowflake:
  worker-id: 2
  datacenter-id: 1

management:
  endpoints:
    web:
      exposure:
        include: health,info
